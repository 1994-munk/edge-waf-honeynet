# Local rule tuning. Keep this file small. Anything noisy should be
# proposed as a PR with a link to a sample log line.

# 1) Don't flag our own health checker.
SecRule REMOTE_ADDR "^127\.0\.0\.1$" \
  "id:1000,phase:1,nolog,pass,ctx:health"

# 2) Reduce false positives on Atom/RSS readers that send weird Accept.
SecRule REQUEST_HEADERS:Accept "@rx ^application/(atom|rss)\+xml" \
  "id:1001,phase:1,t:none,ctl:ruleRemoveById=920300,pass,nolog"

# 3) Custom rule: block obvious WordPress login brute force at the edge.
SecRule REQUEST_URI "@beginsWith /wp-login.php" \
  "id:1100,phase:1,deny,status:418,log,msg:'wp-login probed',tag:'attack-bruteforce'"
