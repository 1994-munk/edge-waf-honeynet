upstream app   { server origin:80; }
upstream honey { server http-honeypot:80; }

# Public edge. Routes most traffic to the app; ModSec/CRS will reject the
# obvious bad stuff. Anything that looks like a scanner gets quietly
# routed to the honeypot instead of being 403'd, so we can study it.
server {
  listen 80 default_server;
  server_name _;

  add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "no-referrer" always;

  limit_req zone=perip burst=40 nodelay;
  limit_conn connperip 50;

  # Defense in depth: never let dotfiles through, even if app misconfigured.
  location ~ /\. { deny all; access_log off; }

  # Scanner heuristics: known bad paths or obviously-bot UAs.
  set $route_honey 0;
  if ($request_uri ~* "(wp-login|xmlrpc\.php|phpmyadmin|\.env|\.git/|/cgi-bin/)") {
    set $route_honey 1;
  }
  if ($http_user_agent ~* "(nmap|nikto|sqlmap|masscan|curl/7\.|python-requests)") {
    set $route_honey "${route_honey}1";
  }

  location / {
    if ($route_honey != "0") { proxy_pass http://honey; break; }
    proxy_pass http://app;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header X-Real-IP $remote_addr;
  }
}
