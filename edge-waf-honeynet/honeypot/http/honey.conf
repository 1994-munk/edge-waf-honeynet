log_format honey_json escape=json
  '{"ts":"$time_iso8601","client":"$http_x_real_ip","ua":"$http_user_agent",'
  '"method":"$request_method","uri":"$request_uri","body":"$request_body"}';

server {
  listen 80;
  server_name _;
  client_max_body_size 64k;
  access_log /var/log/nginx/honey.json honey_json;

  location / { root /usr/share/nginx/html; index index.html; }

  # Pretend wp-login is there and "accepts" creds — capture POST body.
  location = /wp-login.php {
    add_header Content-Type text/html;
    return 200 "<html><body>Try again</body></html>";
  }

  # Pretend .env is there and leaks fake creds.
  location = /.env {
    add_header Content-Type text/plain;
    return 200 "APP_ENV=production\nDB_PASSWORD=hunter2-bait\n";
  }
}
