name: ci
on: [push, pull_request]
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Nginx config
        run: |
          docker run --rm \
            -v $PWD/nginx/nginx.conf:/etc/nginx/nginx.conf:ro \
            -v $PWD/nginx/conf.d:/etc/nginx/conf.d:ro \
            -v $PWD/modsec:/etc/nginx/modsec:ro \
            owasp/modsecurity-crs:nginx-alpine \
            nginx -t -c /etc/nginx/nginx.conf || true

      - name: Lint Sigma rules
        run: |
          pip install sigma-cli pyyaml
          for f in detections/sigma/*.yml; do
            python -c "import yaml,sys; yaml.safe_load(open('$f'))" && echo "ok $f"
          done

      - name: Smoke test stack
        run: |
          docker compose up -d
          sleep 10
          ./tests/waf_blocks.sh
