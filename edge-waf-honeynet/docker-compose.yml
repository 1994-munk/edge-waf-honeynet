services:
  origin:
    image: nginx:1.27-alpine
    container_name: origin
    networks: [internal]

  http-honeypot:
    build: ./honeypot/http
    container_name: http-honeypot
    networks: [internal]

  ssh-honeypot:
    image: cowrie/cowrie:latest
    container_name: ssh-honeypot
    ports: ["2222:2222"]
    volumes:
      - ./honeypot/cowrie/userdb.txt:/cowrie/cowrie-git/etc/userdb.txt:ro
      - cowrie-logs:/cowrie/cowrie-git/var/log/cowrie
    networks: [internal]

  edge:
    image: owasp/modsecurity-crs:nginx-alpine
    container_name: edge
    depends_on: [origin, http-honeypot]
    ports: ["80:80"]
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./modsec:/etc/nginx/modsec/rules:ro
      - edge-logs:/var/log/nginx
    networks: [internal, public]

  fail2ban:
    image: crazymax/fail2ban:latest
    container_name: fail2ban
    network_mode: host
    cap_add: [NET_ADMIN, NET_RAW]
    volumes:
      - ./fail2ban:/etc/fail2ban
      - edge-logs:/var/log/nginx:ro
      - cowrie-logs:/var/log/cowrie:ro

volumes:
  edge-logs:
  cowrie-logs:

networks:
  internal:
  public:
